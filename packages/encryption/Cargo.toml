[package]
authors = { workspace = true }
categories = ["command-line-utilities", "development-tools"]
description = "Encryption domain for git-sshripped"
edition = { workspace = true }
keywords = ["crypt", "deterministic", "encryption", "git", "ssh"]
license = { workspace = true }
name = "git_sshripped_encryption"
repository = { workspace = true }
version = { workspace = true }

[dependencies]
git_sshripped_encryption_models = { workspace = true }
anyhow = { workspace = true, features = ["std"] }
hkdf = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }

# Optional crypto backends
aes-siv = { workspace = true, optional = true, features = ["std"] }

[features]
default = ["crypto-aes-siv"]
fail-on-warnings = []
crypto-aes-siv = ["dep:aes-siv"]

[dev-dependencies]
proptest = { workspace = true }
