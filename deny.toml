[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
]

[advisories]
ignore = [
  # age currently depends on rsa for ssh-rsa recipient support; no upstream fix available yet.
  # Track: https://rustsec.org/advisories/RUSTSEC-2023-0071
  "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "warn"
